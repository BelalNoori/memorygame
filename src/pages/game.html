<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/src/styles/game.scss">
    <title>Game | Memory</title>
</head>

<body>
    <div class="game-container">

        <div class="game-header">
            <div class="player-scores">
                <div class="labelss">
                    <img class="labels" src="/assets/labelB.svg" alt="player blue">
                    <span class="playerone">Blue 0</span>
                </div>
                <div class="labelss">
                    <img class="labels" src="/assets/labelO.svg" alt="player orange">
                    <span class="playertwo">Orange 6</span>
                </div>
            </div>
            <div class="current-player">
                <span class="current">Current player: </span>
                <img src="/assets/player-icon.svg" alt="">
            </div>
            <button class="exit-btn">
                <img src="/assets/exit.svg" alt="exit">
                <span class="exit-text">Exit game</span>
            </button>
        </div>
        <div class="game-board"></div>

        <div class="popup-overlay">
            <div class="popup-exit">
                <div class="popup-content">
                    <h2>Are you sure you want to quit the game?</h2>
                    <div class="popup-btn">
                        <button class="btnn">
                            <span class="popup-btn-text">Back to game</span>
                        </button>
                        <button class="btn-cold">
                            <span class="popup-btn-text">Exit game</span>
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script type="module" src="/src/pages/game.ts"></script>
</body>

</html>
