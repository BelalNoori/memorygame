<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/src/styles/game.scss">
    <title>Game | Memory</title>
</head>

<body>
    <div class="game-container">

        <div class="game-header">
            <div class="player-scores">
                <div class="labelss">
                    <img class="labels" src="/assets/labelB.svg" alt="">
                    <span class="playerone">Blue 0</span>
                </div>
                <div class="labelss">
                    <img class="labels" src="/assets/labelO.svg" alt="">
                    <span class="playertwo">Orange 6</span>
                </div>
            </div>
            <div class="current-player">
                Current player: <img src="/assets/player-icon.svg" alt="">
            </div>
            <button class="exit-btn">
                <img src="/assets/exit.svg" alt="">
                Exit game
            </button>
        </div>

        <div class="game-board">
            <!-- Karten werden per TS generiert -->
        </div>

    </div>
</body>

</html>
